<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <style>
        body {
            min-height: 50vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2c2c2c !important;
        }

        .app-card {
            max-width: 800px;
            width: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(2px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25), 0 4px 12px rgba(0,0,0,0.05);
            overflow: hidden;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            padding: 0.5rem 1.5rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.7rem 1.8rem;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 3rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: #2c3e4e;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .tab-btn:hover {
            background: rgba(100, 108, 255, 0.12);
            transform: translateY(-2px);
            color: #1f2c38;
        }

        .page {
            display: none;
        }

        .page.show {
            display: block;
        }

        .bio-text {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #1e293b, #2d3a4a);
            background-clip: text;
            -webkit-background-clip: text;
        }

        .bio-card {
            background: rgba(248,250,255,0.8);
            border-radius: 1.8rem;
            padding: 1.2rem 1.6rem;
            backdrop-filter: blur(4px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.02);
        }

        .input-panel {
            background: #ffffff;
            border-radius: 1.8rem;
            padding: 1.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid #eef2ff;
        }

        .field-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1.8rem;
            align-items: center;
        }

        .stylish-input {
            flex: 3;
            min-width: 180px;
            background: #f9fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 2rem;
            padding: 0.85rem 1.3rem;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.25s;
            outline: none;
            color: #0f172a;
        }

        .btn-glow {
            background: linear-gradient(100deg, #6366f1, #a855f7);
            border: none;
            padding: 0.85rem 1.8rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(99,102,241,0.2);
            font-family: inherit;
            letter-spacing: 0.3px;
        }

        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            animation: shake 0.3s ease;
        }

        .game-card {
            background: radial-gradient(circle at 10% 30%, rgba(139,92,246,0.08), rgba(99,102,241,0.02));
            border-radius: 2rem;
            padding: 1.8rem;
            text-align: center;
            border: 1px solid rgba(139,92,246,0.2);
            transition: transform 0.2s;
        }

        .color-api-container {
            margin-top: 1rem;
        }
        
        .random-color-box {
            width: 100%;
            min-height: 160px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 1.5rem;
            margin: 1rem 0 1.2rem 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .random-color-box:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 28px rgba(0,0,0,0.2);
        }
        
        .color-hex {
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            color: white;
            letter-spacing: 2px;
        }
        
        .color-rgb-display {
            font-family: monospace;
            font-size: 1rem;
            margin-top: 0.8rem;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
            border-radius: 1.5rem;
            color: #f0f0f0;
        }
        
        .generate-color-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
            font-family: inherit;
            margin-top: 0.5rem;
            width: 100%;
        }
        
        .generate-color-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102,126,234,0.5);
        }
        
        .color-info {
            font-size: 0.85rem;
            color: #5a6e8a;
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(139,92,246,0.2);
        }
        
        @keyframes colorPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .color-pop-animation {
            animation: colorPop 0.3s ease;
        }
        
        .empty-message {
            text-align: center;
            color: #94a3b8;
            padding: 2rem;
            font-style: italic;
        }
        
        .value-item {
            background: #f8fafc;
            padding: 0.6rem 1rem;
            margin: 0.5rem 0;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border-left: 3px solid #8b5cf6;
        }
    </style>
</head>
<body>
<div class="app-card">
    <header class="glass-header">
        <div class="tab-nav" id="tabNav">
            <button data-group=".page" data-target="page-1" class="tab-btn active">обо мне</button>
            <button data-group=".page" data-target="page-2" class="tab-btn">работы</button>
            <button data-group=".page" data-target="page-3" class="tab-btn">АПИ</button>
        </div>
    </header>
    <main class="main-content">
        <div class="page show" id="page-1">
            <div class="bio-card">
                <div class="bio-text">
                    Хочу обучиться Python и создавать классные проекты.<br>
                </div>
                <div style="margin-top: 1.2rem; font-size: 0.9rem; color: #4b5563; display: flex; gap: 1rem; flex-wrap: wrap;">
                    <span>код и творчество</span>
                    <span>цель: разработка сайтов</span>
                </div>
            </div>
        </div>
        <div class="page" id="page-2">
            <div class="input-panel">
                <div class="field-group">
                    <input type="text" id="textInput" class="stylish-input" placeholder="Напиши что-то " autocomplete="off">
                    <button id="submitBtn" class="btn-glow">Добавить</button>
                </div>
                <div id="outputLine"></div>
            </div>
        </div>
        <div class="page" id="page-3">
            <div class="game-card">
                <div class="game-text">                
                <div class="color-api-container">
                    <div style="margin: 1rem 0 0.5rem 0; font-weight: 600; color: #000000;">
                        Генератор случайных цветов (API)
                    </div>
                    <div class="random-color-box" id="randomColorBox">
                        <div class="color-hex" id="colorHexValue">#6C63FF</div>
                        <div class="color-rgb-display" id="colorRgbValue">rgb(108, 99, 255)</div>
                    </div>
                    <button class="generate-color-btn" id="generateColorBtn">
                        Сгенерировать цвет 
                    </button>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
<script>
    const allTabButtons = document.querySelectorAll('.tab-btn');
    const pages = document.querySelectorAll('.page');
    function switchTab(targetId, clickedBtn) {
        pages.forEach(page => {
            if (page.id === targetId) {
                if (!page.classList.contains('show')) {
                    page.classList.add('show');
                }
            } else {
                page.classList.remove('show');
            }
        });
        allTabButtons.forEach(btn => {
            if (btn === clickedBtn) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }
    
    document.querySelectorAll('button[data-group]').forEach(button => {
        button.addEventListener('click', (event) => {
            const targetSelector = button.dataset.target;   
            const groupSelector = button.dataset.group;   
            if (targetSelector && groupSelector) {
                const targetPage = document.getElementById(targetSelector);
                if (targetPage) {
                    const groupElements = document.querySelectorAll(groupSelector);
                    groupElements.forEach(el => {
                        el.classList.remove('show');
                    });
                    targetPage.classList.add('show');
                    allTabButtons.forEach(btn => {
                        const btnTarget = btn.dataset.target;
                        if (btnTarget === targetSelector) {
                            btn.classList.add('active');
                        } else {
                            btn.classList.remove('active');
                        }
                    });
                }
            }
        });
    });
    
    const textInput = document.getElementById('textInput');
    const submitBtn = document.getElementById('submitBtn');
    const outputContainer = document.getElementById('outputLine');
    let storedValues = [];
    function renderList() {
        if (!outputContainer) return;
        if (storedValues.length === 0) {
        }
        
        let itemsHtml = '';
        storedValues.forEach((value, idx) => {
            const safeValue = escapeHtml(value);
            itemsHtml += `
                <div class="value-item">
                    <span style="font-weight: 600; color:#6d28d9;">#${idx+1}</span> 
                    <span style="margin-left: 10px;">${safeValue}</span>
                </div>
            `;
        });
        outputContainer.innerHTML = itemsHtml;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }
    let errorTimeout = null;
    function showTemporaryError(msg) {
        if (errorTimeout) clearTimeout(errorTimeout);
        const originalHTML = outputContainer.innerHTML;
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message';
        errorDiv.innerText = msg;
        if (storedValues.length === 0) {
            outputContainer.innerHTML = '';
            outputContainer.appendChild(errorDiv);
        } else {
            const tempMsg = document.createElement('div');
            tempMsg.className = 'error-message';
            tempMsg.innerText = msg;
            if (outputContainer.firstChild) {
                outputContainer.insertBefore(tempMsg, outputContainer.firstChild);
            } else {
                outputContainer.appendChild(tempMsg);
            }
            setTimeout(() => {
                if (tempMsg && tempMsg.parentNode) tempMsg.remove();
            }, 1500);
            return;
        }
        errorTimeout = setTimeout(() => {
            renderList();
            errorTimeout = null;
        }, 1500);
    }
    
    function addValue() {
        let rawText = textInput.value;
        if (rawText === undefined) return;
        const trimmed = rawText.trim();
        if (trimmed === "") {
            if (outputContainer) {
                showTemporaryError(" Пожалуйста, введите текст перед добавлением!");
            } else {
                alert("Введите текст");
            }

            textInput.style.transform = 'shake 0.2s';
            textInput.style.borderColor = '#f87171';
            setTimeout(() => {
                textInput.style.borderColor = '#e2e8f0';
                textInput.style.transform = '';
            }, 400);
            return;
        }
        
        storedValues.unshift(trimmed);
        if (storedValues.length > 10) {
            storedValues.pop();
        }
        renderList();
        textInput.value = '';
        textInput.style.transform = 'scale(1.01)';
        setTimeout(() => { textInput.style.transform = ''; }, 150);
        if (outputContainer) {
            outputContainer.style.transition = 'background 0.2s';
            outputContainer.style.background = '#f5f3ff';
            setTimeout(() => { outputContainer.style.background = ''; }, 300);
        }
    }
    
    if (submitBtn) {
        submitBtn.addEventListener('click', addValue);
    }

    if (textInput) {
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addValue();
            }
        });
    }
    
    function generateRandomColor() {
        const r = Math.floor(Math.random() * 256);
        const g = Math.floor(Math.random() * 256);
        const b = Math.floor(Math.random() * 256);
        const hex = '#' + [r, g, b].map(x => {
            const hexVal = x.toString(16);
            return hexVal.length === 1 ? '0' + hexVal : hexVal;
        }).join('');
        const rgb = `rgb(${r}, ${g}, ${b})`;
        return { hex, rgb, r, g, b };
    }
    
    function applyColor(colorObj) {
        const colorBox = document.getElementById('randomColorBox');
        const hexElement = document.getElementById('colorHexValue');
        const rgbElement = document.getElementById('colorRgbValue');
        
        if (colorBox && hexElement && rgbElement) {
            colorBox.style.background = `linear-gradient(135deg, ${colorObj.hex} 0%, ${colorObj.hex}cc 100%)`;
            hexElement.textContent = colorObj.hex;
            rgbElement.textContent = colorObj.rgb;
            colorBox.classList.add('color-pop-animation');
            setTimeout(() => {
                colorBox.classList.remove('color-pop-animation');
            }, 300);

            const brightness = (colorObj.r * 299 + colorObj.g * 587 + colorObj.b * 114) / 1000;
            const textColor = brightness > 128 ? '#1a1a2e' : '#ffffff';
            const bgOpacity = brightness > 128 ? 'rgba(255,255,255,0.8)' : 'rgba(0,0,0,0.7)';
            hexElement.style.background = bgOpacity;
            rgbElement.style.background = brightness > 128 ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.5)';
            hexElement.style.color = textColor;
            rgbElement.style.color = textColor;
        }
    }
    
    function fetchNewColor() {
        const newColor = generateRandomColor();
        applyColor(newColor);
        console.log(`API цвет сгенерирован: ${newColor.hex} | ${newColor.rgb}`);
        document.body.style.transition = 'background 0.5s ease';
        document.body.style.background = `radial-gradient(circle at 20% 30%, ${newColor.hex}20, #e2e8f0)`;
        setTimeout(() => {
            document.body.style.background = '#2c2c2c';
        }, 800);
    }
    
    const colorGenerateBtn = document.getElementById('generateColorBtn');
    const colorBox = document.getElementById('randomColorBox');
    
    if (colorGenerateBtn) {
        colorGenerateBtn.addEventListener('click', fetchNewColor);
    }
    
    if (colorBox) {
        colorBox.addEventListener('click', fetchNewColor);
    }
    
    if (typeof window !== 'undefined') {
        setTimeout(() => {
            const initialColor = generateRandomColor();
            applyColor(initialColor);
            document.body.style.background = '#2c2c2c';
        }, 100);
    } 
</script>
